<!DOCTYPE html>
<html>
<head>
    <title>Enter Attendance</title>
    <style>
        body {
            font-family: Arial;
            background-color: #eef2f7;
            text-align: center;
        }
        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
<h2>Enter Attendance Details</h2>

<form action="/result" method="POST">

<input type="hidden" name="n" value="{{ n }}">

{% for i in range(n) %}
    <h3>Subject {{ i+1 }}</h3>

    <input type="text" name="name{{i}}" placeholder="Subject Name" required>
    <input type="number" name="attended{{i}}" placeholder="Attended" required>
    <input type="number" name="total{{i}}" placeholder="Total" required>
    <br><br>
{% endfor %}

<button type="submit">Analyze</button>

</form>
</div>

</body>
</html>
